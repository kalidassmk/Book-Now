# Set to true ONLY when you are ready for live trading with real money
trading.live-mode=true
trading.auto-buy-enabled=true

# Fixed USDT amount to spend per trade
trading.buy-amount-usdt=12

# Limit-buy order offset: place buy order this many % BELOW the current price.
# A small dip after a fast-move signal typically fills the order within seconds.
# 0.3 = buy at 0.30% below current price
trading.limit-buy-offset-pct=0.3

# ── Fast-scalp settings (see TradingConfig.java) ─────────────────────────
# These are runtime defaults — they are also stored in Redis under
# TRADING_CONFIG and editable from the dashboard.
#
# trading.tsl.percentage  : how far price can drop from peak before forcing
#                           a market exit (default 2.0 = 2%).
#
# Other fast-scalp knobs (TradingConfig defaults; change via dashboard):
#   fastScalpMode         = true   → rules call tryBuy() directly,
#                                    skipping CoinAnalyzer + Consensus
#   maxHoldSeconds        = 300    → force market exit after 5 min
#   marketExitOnTimeout   = true   → exits use MARKET, not LIMIT
#   profitAmountUsdt      = 0.20   → +$0.20 USDT take-profit (limit-sell)
trading.tsl.percentage=2.0

logging.level.com.bogoai=INFO
logging.level.root=WARN


